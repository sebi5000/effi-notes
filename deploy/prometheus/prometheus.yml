# Prometheus — receives OTLP from the collector via the
# --enable-feature=otlp-write-receiver flag set on the service. No scrape
# config because the apps push (otlp), not pull. Customers wanting
# scraping (e.g. node-exporter) add scrape_configs here.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: app-template
    deployment_environment: ${APP_ENV:-local}

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
