# Dev overrides — apply with:
#   docker compose -f deploy/compose/docker-compose.yml -f deploy/compose/docker-compose.dev.yml up -d
#
# Exposes ports to the host so local tooling (Prisma migrate, Studio,
# database GUIs, browser-side Keycloak admin) can reach the services.

services:
  postgres-app:
    ports:
      - '5432:5432'

  postgres-keycloak:
    ports:
      - '5433:5432'

  keycloak:
    ports:
      - '8080:8080'

  redis:
    ports:
      - '6379:6379'

  # Observability — only effective when `--profile obs` is also passed
  otel-collector:
    ports:
      - '4318:4318' # OTLP HTTP

  grafana:
    ports:
      - '3001:3000' # Grafana UI (3001 to avoid clash with web)
