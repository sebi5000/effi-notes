# Dev overrides — apply with `make up-dev`, which expands to:
#   docker compose \
#     --env-file deploy/compose/.env.local-defaults \
#     -f deploy/compose/docker-compose.yml \
#     -f deploy/compose/docker-compose.dev.yml \
#     up -d
#
# Exposes ports to the host (so local tooling and browsers can reach the
# services) and swaps the production realm for one that includes a test
# user, so contributors can sign in without going through the
# customer-install Keycloak UI dance.

services:
  postgres-app:
    ports:
      - '5432:5432'

  postgres-keycloak:
    ports:
      - '5433:5432'

  keycloak:
    ports:
      - '8080:8080'
    # !override replaces the inherited volume list. Without it, compose
    # would append the dev mount and leave the prod realm export attached
    # too — Keycloak then imports both, and the test user from the dev
    # realm would leak into a misconfigured production install.
    volumes: !override
      - ../keycloak/realm-export.dev.json:/opt/keycloak/data/import/realm-export.json:ro

  redis:
    ports:
      - '6379:6379'

  worker:
    # y-websocket relay on 3101 — only mapped in dev so the browser at
    # localhost:3000 can connect directly. In prod Caddy proxies /yjs/*.
    ports:
      - '3101:3101'

  # Observability — only effective when `--profile obs` is also passed.
  otel-collector:
    ports:
      - '4318:4318' # OTLP HTTP

  grafana:
    ports:
      - '3001:3000' # Grafana UI (3001 to avoid clash with web)
