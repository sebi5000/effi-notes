name: app-template

# Phase 2: postgres-app.       Phase 3: postgres-keycloak + keycloak.
# Phase 4: redis.   Phase 5: observability profile.   Phase 6: caddy.

x-restart-policy: &restart
  restart: unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  postgres-app:
    image: postgres:16.10-alpine
    <<: *restart
    logging: *logging
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-app:/var/lib/postgresql/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Port only exposed via the dev override file (deploy/compose/docker-compose.dev.yml)

  postgres-keycloak:
    image: postgres:16.10-alpine
    <<: *restart
    logging: *logging
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-keycloak:/var/lib/postgresql/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    <<: *restart
    logging: *logging
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    command: ['start-dev', '--import-realm']
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Bootstrap admin (used once, then disable / replace)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_LOG_LEVEL: INFO
      # In production: switch `start-dev` → `start` and set KC_HOSTNAME to public URL
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - net-app
      - net-data
    healthcheck:
      # The Keycloak image ships a built-in healthcheck binary on port 9000
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e "GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n" >&3 && cat <&3 | head -1 | grep -q "200 OK"']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    # Port only exposed via the dev override file

  redis:
    image: redis:7.4.6-alpine
    <<: *restart
    logging: *logging
    command:
      [
        'redis-server',
        '--save',
        '60',
        '1',
        '--loglevel',
        'warning',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    volumes:
      - redis-data:/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.5'
    # noeviction is mandatory for BullMQ — see ADR 0018

  # ── Observability stack — only starts with `--profile obs` ─────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ../otel-collector/config.yaml:/etc/otel/config.yaml:ro
    networks:
      - net-obs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  loki:
    image: grafana/loki:3.7.1
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command: ['-config.file=/etc/loki/config.yaml']
    volumes:
      - ../loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  tempo:
    image: grafana/tempo:2.10.5
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command: ['-config.file=/etc/tempo/config.yaml']
    volumes:
      - ../tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3200/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  prometheus:
    image: prom/prometheus:v3.11.3
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--enable-feature=otlp-write-receiver'
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:9090/-/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:13.1.0
    <<: *restart
    logging: *logging
    profiles: ['obs']
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor,tempoSearch
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'

volumes:
  postgres-app:
    name: app-template_postgres-app
  postgres-keycloak:
    name: app-template_postgres-keycloak
  redis-data:
    name: app-template_redis-data
  loki-data:
    name: app-template_loki-data
  tempo-data:
    name: app-template_tempo-data
  prometheus-data:
    name: app-template_prometheus-data
  grafana-data:
    name: app-template_grafana-data

networks:
  net-data:
    name: app-template_net-data
  net-app:
    name: app-template_net-app
  net-obs:
    name: app-template_net-obs
