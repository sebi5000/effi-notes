# No `name:` field — Compose derives the project from $COMPOSE_PROJECT_NAME
# or the parent directory. This lets customers run staging + prod side by
# side on the same host (each with its own COMPOSE_PROJECT_NAME) and lets
# forks rename without touching this file.
#
# Phase 2: postgres-app. Phase 3: postgres-keycloak + keycloak.
# Phase 4: redis. Phase 5: observability profile (--profile obs).
# Phase 6: caddy + web + worker + migrator.

x-restart-policy: &restart
  restart: unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  postgres-app:
    image: postgres:16.10-alpine
    <<: *restart
    logging: *logging
    environment:
      # Required from .env (or shell). No fallbacks — fail loud if missing.
      # Dev / smoke load deploy/compose/.env.local-defaults via --env-file.
      POSTGRES_USER: ${POSTGRES_APP_USER:?POSTGRES_APP_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_APP_DB:?POSTGRES_APP_DB is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-app:/var/lib/postgresql/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Port only exposed via the dev override file (deploy/compose/docker-compose.dev.yml)

  postgres-keycloak:
    image: postgres:16.10-alpine
    <<: *restart
    logging: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER:?POSTGRES_KEYCLOAK_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:?POSTGRES_KEYCLOAK_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DB:?POSTGRES_KEYCLOAK_DB is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-keycloak:/var/lib/postgresql/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    <<: *restart
    logging: *logging
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    command: ['start-dev', '--import-realm']
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_KEYCLOAK_DB:?POSTGRES_KEYCLOAK_DB is required}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER:?POSTGRES_KEYCLOAK_USER is required}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD:?POSTGRES_KEYCLOAK_PASSWORD is required}
      # Bootstrap admin: used on first start to create the master-realm admin.
      # Customer admins replace this account in the Keycloak UI immediately
      # after the first login (operations runbook).
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:?KC_BOOTSTRAP_ADMIN_USERNAME is required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD is required}
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_LOG_LEVEL: INFO
      # In production: switch `start-dev` → `start` and set KC_HOSTNAME to public URL
    volumes:
      # Production realm — does NOT contain test users.
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - net-app
      - net-data
    healthcheck:
      # The Keycloak image is minimal (no curl/wget/nc) but ships bash + java.
      # bash's /dev/tcp does the TCP-level health probe against the management
      # port (9000 → /health/ready). CMD-SHELL is /bin/sh which lacks /dev/tcp,
      # so we invoke bash explicitly.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && head -1 <&3 | grep -q "200"'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    # Port only exposed via the dev override file

  redis:
    image: redis:7.4.6-alpine
    <<: *restart
    logging: *logging
    command:
      [
        'redis-server',
        '--save',
        '60',
        '1',
        '--loglevel',
        'warning',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    volumes:
      - redis-data:/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.5'
    # noeviction is mandatory for BullMQ — see ADR 0018

  # ── Application services ───────────────────────────────────────────────
  migrator:
    # One-shot: applies pending Prisma migrations, then exits 0.
    # The web service depends on this completing before it starts —
    # zero-downtime updates rely on this ordering.
    # The migrator image is the worker image; only the CMD differs.
    image: ${REGISTRY:?REGISTRY is required}/worker:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: missing
    restart: 'no'
    logging: *logging
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:?required}:${POSTGRES_APP_PASSWORD:?required}@postgres-app:5432/${POSTGRES_APP_DB:?required}?schema=public
    command: ['bun', '--filter', '@app/db', 'migrate:deploy']
    networks:
      - net-data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  web:
    image: ${REGISTRY:?REGISTRY is required}/web:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: missing
    <<: *restart
    logging: *logging
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: production
      APP_BASE_URL: https://app.example.com
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:?required}:${POSTGRES_APP_PASSWORD:?required}@postgres-app:5432/${POSTGRES_APP_DB:?required}?schema=public
      DATABASE_POOL_MAX: '10'
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_ISSUER: https://auth.example.com/realms/app
      KEYCLOAK_CLIENT_ID: app-web
      # Required at app boot (Zod fail-fast in @app/config/env). The `:-`
      # form lets `docker compose config` validate without requiring secrets
      # — customer .env supplies real values at `up` time. Empty values
      # produce a loud Zod error in the web container, never silent failure.
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: https://app.example.com
      AUTH_TRUST_HOST: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: app-web
      WORKER_HTTP_PORT: '3100'
      BULL_BOARD_INTERNAL_URL: http://worker:3100
    networks:
      - net-edge
      - net-app
      - net-data
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3000/api/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.5'

  worker:
    image: ${REGISTRY:?REGISTRY is required}/worker:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: missing
    <<: *restart
    logging: *logging
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:?required}:${POSTGRES_APP_PASSWORD:?required}@postgres-app:5432/${POSTGRES_APP_DB:?required}?schema=public
      DATABASE_POOL_MAX: '5'
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_ISSUER: https://auth.example.com/realms/app
      KEYCLOAK_CLIENT_ID: app-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: https://app.example.com
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: app-worker
      WORKER_CONCURRENCY: '4'
      WORKER_HTTP_PORT: '3100'
      BULL_BOARD_INTERNAL_URL: http://localhost:3100
    networks:
      - net-app
      - net-data
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3100/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  caddy:
    image: caddy:2.11.2-alpine
    <<: *restart
    logging: *logging
    depends_on:
      web:
        condition: service_started
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../caddy/snippets:/etc/caddy/snippets:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-app.example.com}
      AUTH_HOSTNAME: ${AUTH_HOSTNAME:-auth.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    networks:
      - net-edge
      - net-app # so Caddy can proxy to keycloak
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:80 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # ── Observability stack — only starts with `--profile obs` ─────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ../otel-collector/config.yaml:/etc/otel/config.yaml:ro
    networks:
      - net-obs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  loki:
    image: grafana/loki:3.7.1
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command: ['-config.file=/etc/loki/config.yaml']
    volumes:
      - ../loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  tempo:
    image: grafana/tempo:2.10.5
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command: ['-config.file=/etc/tempo/config.yaml']
    volumes:
      - ../tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3200/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  prometheus:
    image: prom/prometheus:v3.11.3
    <<: *restart
    logging: *logging
    profiles: ['obs']
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--enable-feature=otlp-write-receiver'
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:9090/-/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:13.1.0
    <<: *restart
    logging: *logging
    profiles: ['obs']
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor,tempoSearch
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - net-obs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'

# Volumes and networks intentionally have no `name:` field — Compose
# derives them as `<project>_<key>`. This lets customers run multiple
# instances on the same host (e.g. staging + prod) without colliding
# on volume names. The backup script reads the project name dynamically.
volumes:
  postgres-app:
  postgres-keycloak:
  redis-data:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:

networks:
  net-edge:
  net-data:
  net-app:
  net-obs:
