name: app-template

# Phase 2: postgres-app.       Phase 3: postgres-keycloak + keycloak.
# Phase 4: redis.   Phase 5: observability profile.   Phase 6: caddy.

x-restart-policy: &restart
  restart: unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  postgres-app:
    image: postgres:16.10-alpine
    <<: *restart
    logging: *logging
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-app:/var/lib/postgresql/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Port only exposed via the dev override file (deploy/compose/docker-compose.dev.yml)

  postgres-keycloak:
    image: postgres:16.10-alpine
    <<: *restart
    logging: *logging
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-keycloak:/var/lib/postgresql/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    <<: *restart
    logging: *logging
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    command: ['start-dev', '--import-realm']
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Bootstrap admin (used once, then disable / replace)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_LOG_LEVEL: INFO
      # In production: switch `start-dev` → `start` and set KC_HOSTNAME to public URL
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - net-app
      - net-data
    healthcheck:
      # The Keycloak image ships a built-in healthcheck binary on port 9000
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e "GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n" >&3 && cat <&3 | head -1 | grep -q "200 OK"']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    # Port only exposed via the dev override file

  redis:
    image: redis:7.4.6-alpine
    <<: *restart
    logging: *logging
    command:
      [
        'redis-server',
        '--save',
        '60',
        '1',
        '--loglevel',
        'warning',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    volumes:
      - redis-data:/data
    networks:
      - net-data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.5'
    # noeviction is mandatory for BullMQ — see ADR 0018

volumes:
  postgres-app:
    name: app-template_postgres-app
  postgres-keycloak:
    name: app-template_postgres-keycloak
  redis-data:
    name: app-template_redis-data

networks:
  net-data:
    name: app-template_net-data
  net-app:
    name: app-template_net-app
