# Build override — adds `build:` blocks for local image creation.
#
# Production (customer) installs DON'T use this override. They pull
# pre-built images from ${REGISTRY}/web:${IMAGE_TAG} (and worker).
# Local dev / smoke / CI use this to build images from source.
#
# Apply with `make smoke` or:
#   docker compose \
#     --env-file deploy/compose/.env.local-defaults \
#     -f deploy/compose/docker-compose.yml \
#     -f deploy/compose/docker-compose.build.yml \
#     build

x-bun-build-args: &bun-build-args
  BUN_VERSION: '1.3.13'

services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        <<: *bun-build-args

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
      args:
        <<: *bun-build-args

  migrator:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
      args:
        <<: *bun-build-args
