name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: changesets release PR / publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create / update release PR or publish
        uses: changesets/action@v1
        with:
          # `version` updates package.json + CHANGELOG.md and opens / updates a release PR.
          # `publish` is a no-op for now because all packages are `"private": true` —
          # the published artefact is the container images built by build-images.yml,
          # tagged from the version that lands when this PR is merged.
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
